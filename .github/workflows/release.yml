name: Release Integration

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release (for example 0.0.3 or v0.0.3)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      MANIFEST_PATH: custom_components/zigbee_lock_manager/manifest.json
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate and normalize version
        id: version
        shell: bash
        run: |
          set -euo pipefail
          RAW_VERSION="${{ github.event.inputs.version }}"
          NORMALIZED="${RAW_VERSION#v}"

          if [[ ! "$NORMALIZED" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Version must be semantic version (x.y.z), optionally prefixed by v"
            exit 1
          fi

          TAG="v$NORMALIZED"
          echo "normalized=$NORMALIZED" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Ensure tag does not exist
        shell: bash
        run: |
          set -euo pipefail
          TAG="${{ steps.version.outputs.tag }}"
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "Tag $TAG already exists"
            exit 1
          fi

      - name: Update manifest version
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${{ steps.version.outputs.normalized }}"
          python - <<'PY'
          import json
          from pathlib import Path

          path = Path("custom_components/zigbee_lock_manager/manifest.json")
          manifest = json.loads(path.read_text())
          manifest["version"] = "${{ steps.version.outputs.normalized }}"
          path.write_text(json.dumps(manifest, indent=4) + "\n")
          PY

      - name: Commit version bump
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add "$MANIFEST_PATH"
          if git diff --cached --quiet; then
            echo "No version changes to commit"
          else
            git commit -m "Release ${{ steps.version.outputs.tag }}"
          fi

      - name: Create tag
        shell: bash
        run: |
          set -euo pipefail
          git tag "${{ steps.version.outputs.tag }}"

      - name: Push main and tag
        shell: bash
        run: |
          set -euo pipefail
          git push origin HEAD:main
          git push origin "${{ steps.version.outputs.tag }}"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.tag }}
          generate_release_notes: true
