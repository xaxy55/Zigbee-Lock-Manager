# === Input Helpers ===
input_text:
  {{ lock_name }}_lock_user_{{ slot }}:
    name: "Lock User {{ slot }}"
    max: 25
    mode: text
    icon: mdi:account

  {{ lock_name }}_lock_code_{{ slot }}:
    name: "{{ code_label }} {{ slot }}"
    max: {{ code_max }}
    mode: text
    icon: mdi:dialpad
{% if slot == 1 %}
{% for activity_index in range(1, activity_event_count + 1) %}

  {{ lock_name }}_lock_activity_{{ activity_index }}:
    name: "Activity {{ activity_index }}"
    max: 255
    mode: text
{% endfor %}
{% endif %}

input_boolean:
  {{ lock_name }}_lock_code_status_{{ slot }}:
    name: "Code Status {{ slot }}"

  {{ lock_name }}_lock_code_onetime_{{ slot }}:
    name: "One-time PIN {{ slot }}"
    icon: mdi:numeric-1-box

  {{ lock_name }}_lock_code_presence_aware_{{ slot }}:
    name: "Presence-aware {{ slot }}"
    icon: mdi:account-group
{% if slot == 1 %}

  {{ lock_name }}_lock_notifications_enabled:
    name: "Lock Manager Notifications"
    initial: {{ 'true' if enable_notifications else 'false' }}

  {{ lock_name }}_lock_presence_automation_enabled:
    name: "Presence Automation Enabled"
    initial: {{ 'true' if enable_presence_automation else 'false' }}

{% if lock_profile == "id_lock_202_multi" %}
  {{ lock_name }}_id_lock_202_relock_enabled:
    name: "ReLock Enabled"
    initial: false
    icon: mdi:lock-reset

  {{ lock_name }}_id_lock_202_rfid_enabled:
    name: "RFID Enabled"
    initial: true
    icon: mdi:card-bulleted

  {{ lock_name }}_id_lock_202_master_pin_mode:
    name: "Master PIN Unlock Enabled"
    initial: true
    icon: mdi:key-change
{% endif %}
{% endif %}

input_button:
  {{ lock_name }}_lock_code_update_{{ slot }}:
    name: "Update Code {{ slot }}"
    icon: mdi:upload

  {{ lock_name }}_lock_code_clear_{{ slot }}:
    name: "Clear Code {{ slot }}"
    icon: mdi:trash-can-outline

{% if slot == 1 and lock_profile == "id_lock_202_multi" %}

  {{ lock_name }}_id_lock_202_apply_lock_mode:
    name: "Apply Lock Mode"
    icon: mdi:lock-cog

  {{ lock_name }}_id_lock_202_apply_relock:
    name: "Apply ReLock"
    icon: mdi:lock-reset

  {{ lock_name }}_id_lock_202_apply_audio_volume:
    name: "Apply Audio Volume"
    icon: mdi:volume-high

  {{ lock_name }}_id_lock_202_apply_rfid:
    name: "Apply RFID"
    icon: mdi:card-bulleted

  {{ lock_name }}_id_lock_202_apply_master_pin_mode:
    name: "Apply Master PIN Mode"
    icon: mdi:key-change
{% endif %}

{% if slot == 1 and lock_profile == "id_lock_202_multi" %}
input_number:
  {{ lock_name }}_id_lock_202_battery_low_threshold:
    name: "Battery Low Threshold"
    min: 5
    max: 100
    step: 1
    mode: box
    unit_of_measurement: "%"
    icon: mdi:battery-alert
    initial: {{ battery_low_threshold }}

  {{ lock_name }}_id_lock_202_audio_volume:
    name: "Audio Volume"
    min: 0
    max: 5
    step: 1
    mode: slider
    icon: mdi:volume-high
    initial: 5

input_select:
  {{ lock_name }}_id_lock_202_lock_mode:
    name: "Lock Mode"
    options:
      - "0"
      - "1"
      - "2"
      - "3"
    initial: "0"
    icon: mdi:lock-cog
{% endif %}

{% if slot == 1 %}
template:
  - binary_sensor:
      - name: "{{ lock_name }}_anyone_home"
        unique_id: "{{ lock_name }}_anyone_home"
        icon: mdi:home-account
        state: '{{ "{{ expand(states.person) | selectattr(\"state\", \"eq\", \"home\") | list | count > 0 }}" }}'

script:
  {{ lock_name }}_record_activity:
    alias: "{{ lock_name }}: Record Activity"
    mode: queued
    fields:
      message:
        description: "Activity message"
    sequence:
{% for activity_index in range(activity_event_count, 1, -1) %}
      - service: input_text.set_value
        data:
          entity_id: input_text.{{ lock_name }}_lock_activity_{{ activity_index }}
          value: '{{ "{{ states(\"input_text." ~ lock_name ~ "_lock_activity_" ~ (activity_index - 1) ~ "\") }}" }}'
{% endfor %}
      - service: input_text.set_value
        data:
          entity_id: input_text.{{ lock_name }}_lock_activity_1
          value: '{{ "{{ message }}" }}'

  {{ lock_name }}_audit_event:
    alias: "{{ lock_name }}: Audit Event"
    mode: queued
    fields:
      message:
        description: "Audit message"
    sequence:
      - service: script.turn_on
        target:
          entity_id: script.{{ lock_name }}_record_activity
        data:
          variables:
            message: '{{ "{{ message }}" }}'
      - service: logbook.log
        data:
          name: "Zigbee Lock Manager"
          message: '{{ "{{ message }}" }}'
          entity_id: lock.{{ lock_name }}
      - event: zigbee_lock_manager_audit
        event_data:
          lock_entity: lock.{{ lock_name }}
          lock_name: "{{ lock_name }}"
          message: '{{ "{{ message }}" }}'
      - choose:
          - conditions:
              - condition: state
                entity_id: input_boolean.{{ lock_name }}_lock_notifications_enabled
                state: "on"
            sequence:
              - service: persistent_notification.create
                data:
                  title: "Zigbee Lock Manager"
                  message: '{{ "{{ message }}" }}'
{% endif %}

# === Automations ===
automation:
  - alias: "{{ lock_name }}: Toggle Code Status {{ slot }}"
    trigger:
      - platform: state
        entity_id: input_boolean.{{ lock_name }}_lock_code_status_{{ slot }}
    action:
      - choose:
          - conditions:
              - condition: template
                value_template: '{{ '{{ trigger.to_state.state == "on" }}' }}'
            sequence:
              - service: zha.enable_lock_user_code
                target:
                  entity_id: lock.{{ lock_name }}
                data:
                  code_slot: "{{ slot }}"
              - service: script.turn_on
                target:
                  entity_id: script.{{ lock_name }}_audit_event
                data:
                  variables:
                    message: "Enabled slot {{ slot }} for lock.{{ lock_name }}"
          - conditions:
              - condition: template
                value_template: '{{ '{{ trigger.to_state.state == "off" }}' }}'
            sequence:
              - service: zha.disable_lock_user_code
                target:
                  entity_id: lock.{{ lock_name }}
                data:
                  code_slot: "{{ slot }}"
              - service: script.turn_on
                target:
                  entity_id: script.{{ lock_name }}_audit_event
                data:
                  variables:
                    message: "Disabled slot {{ slot }} for lock.{{ lock_name }}"
    mode: single

  - alias: "{{ lock_name }}: Update Lock Code {{ slot }}"
    trigger:
      - platform: state
        entity_id: input_button.{{ lock_name }}_lock_code_update_{{ slot }}
    action:
      - variables:
          pin_value: '{{ '{{ states("input_text.' + lock_name + '_lock_code_' + slot|string + '") | trim }}' }}'
      - choose:
          - conditions:
              - condition: template
                value_template: '{{ '{{ pin_value is match("' + code_validation_regex + '") }}' }}'
            sequence:
              - service: zha.set_lock_user_code
                target:
                  entity_id: lock.{{ lock_name }}
                data:
                  code_slot: "{{ slot }}"
                  user_code: '{{ '{{ pin_value }}' }}'
              - service: script.turn_on
                target:
                  entity_id: script.{{ lock_name }}_audit_event
                data:
                  variables:
                    message: "Updated code in slot {{ slot }} for lock.{{ lock_name }}"
        default:
          - service: persistent_notification.create
            data:
              title: "Invalid lock code"
              message: "{{ invalid_code_message }}"
          - service: script.turn_on
            target:
              entity_id: script.{{ lock_name }}_audit_event
            data:
              variables:
                message: "Rejected invalid code update for slot {{ slot }} on lock.{{ lock_name }}"
    mode: single

  - alias: "{{ lock_name }}: Clear Lock Code {{ slot }}"
    trigger:
      - platform: state
        entity_id: input_button.{{ lock_name }}_lock_code_clear_{{ slot }}
    action:
      - service: zha.clear_lock_user_code
        target:
          entity_id: lock.{{ lock_name }}
        data:
          code_slot: "{{ slot }}"
      - service: input_text.set_value
        data:
          entity_id: input_text.{{ lock_name }}_lock_code_{{ slot }}
          value: ""
      - service: input_boolean.turn_off
        target:
          entity_id: input_boolean.{{ lock_name }}_lock_code_status_{{ slot }}
      - service: input_boolean.turn_off
        target:
          entity_id: input_boolean.{{ lock_name }}_lock_code_onetime_{{ slot }}
      - service: script.turn_on
        target:
          entity_id: script.{{ lock_name }}_audit_event
        data:
          variables:
            message: "Cleared slot {{ slot }} for lock.{{ lock_name }}"
    mode: single

{% if slot == 1 %}
  - alias: "{{ lock_name }}: Consume One-Time PINs On Unlock"
    trigger:
      - platform: state
        entity_id: lock.{{ lock_name }}
        to: "unlocked"
    action:
      - variables:
          used_slot: >-
{% raw %}
            {% set attrs = trigger.to_state.attributes %}
            {% set code_slot = attrs.get("code_slot") %}
            {% set code_id = attrs.get("code_id") %}
            {% set user_id = attrs.get("user_id") %}
            {% set changed_by = attrs.get("changed_by") %}
            {% if code_slot is number %}
              {{ code_slot | int }}
            {% elif code_slot is string and code_slot is match("^[0-9]+$") %}
              {{ code_slot | int }}
            {% elif code_id is number %}
              {{ code_id | int }}
            {% elif code_id is string and code_id is match("^[0-9]+$") %}
              {{ code_id | int }}
            {% elif user_id is number %}
              {{ user_id | int }}
            {% elif user_id is string and user_id is match("^[0-9]+$") %}
              {{ user_id | int }}
            {% elif changed_by is number %}
              {{ changed_by | int }}
            {% elif changed_by is string and changed_by is match("^[0-9]+$") %}
              {{ changed_by | int }}
            {% else %}
              0
            {% endif %}
{% endraw %}
      - choose:
{% for managed_slot in range(1, slot_count + 1) %}
          - conditions:
              - condition: template
                value_template: '{{ "{{ used_slot == " + managed_slot|string + " }}" }}'
              - condition: state
                entity_id: input_boolean.{{ lock_name }}_lock_code_onetime_{{ managed_slot }}
                state: "on"
              - condition: state
                entity_id: input_boolean.{{ lock_name }}_lock_code_status_{{ managed_slot }}
                state: "on"
            sequence:
              - service: zha.clear_lock_user_code
                target:
                  entity_id: lock.{{ lock_name }}
                data:
                  code_slot: "{{ managed_slot }}"
              - service: input_text.set_value
                data:
                  entity_id: input_text.{{ lock_name }}_lock_code_{{ managed_slot }}
                  value: ""
              - service: input_boolean.turn_off
                target:
                  entity_id:
                    - input_boolean.{{ lock_name }}_lock_code_status_{{ managed_slot }}
                    - input_boolean.{{ lock_name }}_lock_code_onetime_{{ managed_slot }}
              - service: script.turn_on
                target:
                  entity_id: script.{{ lock_name }}_audit_event
                data:
                  variables:
                    message: "Consumed one-time PIN in slot {{ managed_slot }} after unlock on lock.{{ lock_name }}"
{% endfor %}
        default:
          - service: script.turn_on
            target:
              entity_id: script.{{ lock_name }}_audit_event
            data:
              variables:
                message: "Unlock detected but one-time slot could not be resolved from lock attributes (code_slot/code_id/user_id/changed_by)."
    mode: single

  - alias: "{{ lock_name }}: Presence-Aware Slot Enforcement"
    trigger:
      - platform: state
        entity_id: binary_sensor.{{ lock_name }}_anyone_home
    condition:
      - condition: state
        entity_id: input_boolean.{{ lock_name }}_lock_presence_automation_enabled
        state: "on"
    action:
      - choose:
          - conditions:
              - condition: state
                entity_id: binary_sensor.{{ lock_name }}_anyone_home
                state: "off"
            sequence:
{% for managed_slot in range(1, slot_count + 1) %}
              - choose:
                  - conditions:
                      - condition: state
                        entity_id: input_boolean.{{ lock_name }}_lock_code_presence_aware_{{ managed_slot }}
                        state: "on"
                    sequence:
                      - service: input_boolean.turn_off
                        target:
                          entity_id: input_boolean.{{ lock_name }}_lock_code_status_{{ managed_slot }}
                      - service: script.turn_on
                        target:
                          entity_id: script.{{ lock_name }}_audit_event
                        data:
                          variables:
                            message: "Presence automation disabled slot {{ managed_slot }} because nobody is home."
{% endfor %}
          - conditions:
              - condition: state
                entity_id: binary_sensor.{{ lock_name }}_anyone_home
                state: "on"
            sequence:
{% for managed_slot in range(1, slot_count + 1) %}
              - choose:
                  - conditions:
                      - condition: state
                        entity_id: input_boolean.{{ lock_name }}_lock_code_presence_aware_{{ managed_slot }}
                        state: "on"
                    sequence:
                      - service: input_boolean.turn_on
                        target:
                          entity_id: input_boolean.{{ lock_name }}_lock_code_status_{{ managed_slot }}
                      - service: script.turn_on
                        target:
                          entity_id: script.{{ lock_name }}_audit_event
                        data:
                          variables:
                            message: "Presence automation enabled slot {{ managed_slot }} because someone is home."
{% endfor %}
    mode: single

{% if lock_profile == "id_lock_202_multi" %}
  - alias: "{{ lock_name }}: ID Lock 202 Battery Low Alert"
    trigger:
      - platform: state
        entity_id: lock.{{ lock_name }}
    condition:
      - condition: template
        value_template: >-
          {{ "{% set battery = state_attr('lock." + lock_name + "', 'battery_percentage') %}" }}
          {{ "{% set threshold = states('input_number." + lock_name + "_id_lock_202_battery_low_threshold') | int(30) %}" }}
          {{ "{{ battery is number and (battery | int) <= threshold }}" }}
    action:
      - service: script.turn_on
        target:
          entity_id: script.{{ lock_name }}_audit_event
        data:
          variables:
            message: >-
              Low battery alert: lock.{{ lock_name }} is at
              {{ '{{ state_attr("lock.' + lock_name + '", "battery_percentage") }}' }}%.
      - choose:
          - conditions:
              - condition: state
                entity_id: input_boolean.{{ lock_name }}_lock_notifications_enabled
                state: "on"
            sequence:
              - service: persistent_notification.create
                data:
                  title: "Zigbee Lock Manager"
                  message: >-
                    Low battery for lock.{{ lock_name }}:
                    {{ '{{ state_attr("lock.' + lock_name + '", "battery_percentage") }}' }}%
                    (threshold:
                    {{ '{{ states("input_number.' + lock_name + '_id_lock_202_battery_low_threshold") }}' }}%).
    mode: single

  - alias: "{{ lock_name }}: ID Lock 202 Door Error Alert"
    trigger:
      - platform: state
        entity_id: lock.{{ lock_name }}
        attribute: door_state
    condition:
      - condition: template
        value_template: >-
          {% raw %}
          {% set door_state_raw = trigger.to_state.attributes.door_state if trigger.to_state is not none else none %}
          {% set door_state_normalized = (door_state_raw | string | lower | replace('_', ' ')) if door_state_raw is not none else '' %}
          {{ door_state_normalized in ['jammed', 'forced open', 'unspecified error'] }}
          {% endraw %}
    action:
      - service: script.turn_on
        target:
          entity_id: script.{{ lock_name }}_audit_event
        data:
          variables:
            message: >-
              Door tamper/jam alert: lock.{{ lock_name }} reported
              {{ '{{ trigger.to_state.attributes.door_state if trigger.to_state is not none else "unknown" }}' }}.
    mode: single

{% if enable_id_lock_advanced_controls %}
  - alias: "{{ lock_name }}: Apply ID Lock 202 Lock Mode"
    trigger:
      - platform: state
        entity_id: input_button.{{ lock_name }}_id_lock_202_apply_lock_mode
    action:
      - service: zha.set_zigbee_cluster_attribute
        target:
          entity_id: lock.{{ lock_name }}
        data:
          cluster_type: in
          cluster_id: 257
          attribute: 16388
          value: "{{ '{{ states(\"input_select.' + lock_name + '_id_lock_202_lock_mode\") | int(0) }}' }}"
      - service: script.turn_on
        target:
          entity_id: script.{{ lock_name }}_audit_event
        data:
          variables:
            message: "Applied ID Lock lock_mode using selected helper value."
    mode: single

  - alias: "{{ lock_name }}: Apply ID Lock 202 ReLock"
    trigger:
      - platform: state
        entity_id: input_button.{{ lock_name }}_id_lock_202_apply_relock
    action:
      - service: zha.set_zigbee_cluster_attribute
        target:
          entity_id: lock.{{ lock_name }}
        data:
          cluster_type: in
          cluster_id: 257
          attribute: 16389
          value: "{{ '{{ 1 if is_state(\"input_boolean.' + lock_name + '_id_lock_202_relock_enabled\", \"on\") else 0 }}' }}"
      - service: script.turn_on
        target:
          entity_id: script.{{ lock_name }}_audit_event
        data:
          variables:
            message: "Applied ID Lock relock_enabled using selected helper value."
    mode: single

  - alias: "{{ lock_name }}: Apply ID Lock 202 Audio Volume"
    trigger:
      - platform: state
        entity_id: input_button.{{ lock_name }}_id_lock_202_apply_audio_volume
    action:
      - service: zha.set_zigbee_cluster_attribute
        target:
          entity_id: lock.{{ lock_name }}
        data:
          cluster_type: in
          cluster_id: 257
          attribute: 16390
          value: "{{ '{{ states(\"input_number.' + lock_name + '_id_lock_202_audio_volume\") | int(5) }}' }}"
      - service: script.turn_on
        target:
          entity_id: script.{{ lock_name }}_audit_event
        data:
          variables:
            message: "Applied ID Lock audio_volume using selected helper value."
    mode: single

  - alias: "{{ lock_name }}: Apply ID Lock 202 RFID Enabled"
    trigger:
      - platform: state
        entity_id: input_button.{{ lock_name }}_id_lock_202_apply_rfid
    action:
      - service: zha.set_zigbee_cluster_attribute
        target:
          entity_id: lock.{{ lock_name }}
        data:
          cluster_type: in
          cluster_id: 257
          attribute: 16385
          value: "{{ '{{ 1 if is_state(\"input_boolean.' + lock_name + '_id_lock_202_rfid_enabled\", \"on\") else 0 }}' }}"
      - service: script.turn_on
        target:
          entity_id: script.{{ lock_name }}_audit_event
        data:
          variables:
            message: "Applied ID Lock rfid_enabled using selected helper value."
    mode: single

  - alias: "{{ lock_name }}: Apply ID Lock 202 Master PIN Mode"
    trigger:
      - platform: state
        entity_id: input_button.{{ lock_name }}_id_lock_202_apply_master_pin_mode
    action:
      - service: zha.set_zigbee_cluster_attribute
        target:
          entity_id: lock.{{ lock_name }}
        data:
          cluster_type: in
          cluster_id: 257
          attribute: 16384
          value: "{{ '{{ 1 if is_state(\"input_boolean.' + lock_name + '_id_lock_202_master_pin_mode\", \"on\") else 0 }}' }}"
      - service: script.turn_on
        target:
          entity_id: script.{{ lock_name }}_audit_event
        data:
          variables:
            message: "Applied ID Lock master_pin_mode using selected helper value."
    mode: single
{% endif %}
{% endif %}
{% endif %}
