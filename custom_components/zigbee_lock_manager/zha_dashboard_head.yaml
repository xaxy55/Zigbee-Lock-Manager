title: Door Codes
views:
  - path: overview
    title: Overview
    cards:
      - type: markdown
        title: Lock Manager
        content: >-
          **Lock:** `lock.{{ lock_name }}`

          {% if lock_profile == "id_lock_202_multi" %}
          **Profile:** ID Lock 202 Multi  
          **PIN rules:** 4-10 digits
          {% else %}
          **Profile:** Generic ZHA Lock  
          **Code rules:** 1-10 characters
          {% endif %}

          Use each slot card below to set a user name, update code on the lock, or clear a slot.

          {% if lock_profile == "id_lock_202_multi" %}
          **Quick operations:**
          Add unit: Install module with batteries removed, then run Add unit on hub.
          Remove unit: `[Master PIN] * 9 * 0`
          Manual sync: `[Master PIN] * 9 * 1`
          {% endif %}

      - type: entities
        title: Lock Status
        entities:
          - entity: lock.{{ lock_name }}
            name: Door Lock

{% if lock_profile == "id_lock_202_multi" %}
      - type: entities
        title: ID Lock 202 Diagnostics
        entities:
          - type: attribute
            entity: lock.{{ lock_name }}
            attribute: lock_state
            name: Lock state
          - type: attribute
            entity: lock.{{ lock_name }}
            attribute: door_state
            name: Door state
          - type: attribute
            entity: lock.{{ lock_name }}
            attribute: battery_percentage
            name: Battery percentage
          - type: attribute
            entity: lock.{{ lock_name }}
            attribute: sound_volume
            name: Sound volume
{% endif %}

      - type: entities
        title: Automation Controls
        entities:
          - entity: input_boolean.{{ lock_name }}_lock_notifications_enabled
            name: Notifications
          - entity: input_boolean.{{ lock_name }}_lock_presence_automation_enabled
            name: Presence automation

      - type: entities
        title: Lock Activity Timeline
        show_header_toggle: false
        entities:
{% for activity_index in range(1, activity_event_count + 1) %}
          - entity: input_text.{{ lock_name }}_lock_activity_{{ activity_index }}
            name: "{{ activity_index }}"
{% endfor %}

  - path: code_slots
    title: Code Slots
    cards:
