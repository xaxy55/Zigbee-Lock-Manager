      - type: vertical-stack
        cards:
          - type: entities
            title: "Slot {{ slot }}"
            entities:
              - entity: input_text.{{ lock_name }}_lock_user_{{ slot }}
                name: User Name
              - entity: input_text.{{ lock_name }}_lock_code_{{ slot }}
                name: >-
                  {% if lock_profile == "id_lock_202_multi" %}
                  PIN
                  {% else %}
                  Code
                  {% endif %}
              - entity: input_boolean.{{ lock_name }}_lock_code_status_{{ slot }}
                name: Slot Enabled
                state_color: true
                secondary_info: none

          - type: horizontal-stack
            cards:
              - type: button
                name: Update Lock
                icon: mdi:upload
                tap_action:
                  action: call-service
                  service: input_button.press
                  target:
                    entity_id: input_button.{{ lock_name }}_lock_code_update_{{ slot }}
                hold_action:
                  action: none

              - type: button
                name: Clear Slot
                icon: mdi:trash-can-outline
                tap_action:
                  action: call-service
                  service: input_button.press
                  target:
                    entity_id: input_button.{{ lock_name }}_lock_code_clear_{{ slot }}
                hold_action:
                  action: none
